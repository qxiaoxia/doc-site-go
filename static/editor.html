<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档编辑器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ai-container">
        <!-- 顶部导航栏 -->
        <header class="top-nav">
            <div class="nav-left">
                <span class="logo">📝</span>
                <span class="brand">文档编辑器</span>
            </div>
            <div class="nav-right">
                <span class="user-name" id="welcomeMsg"></span>
                <button id="logoutBtn" class="btn-ghost">退出</button>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 移动端遮罩层 -->
            <div class="sidebar-overlay" id="sidebarOverlay"></div>
            
            <!-- 文档列表（可折叠） -->
            <aside class="docs-sidebar" id="docsSidebar">
                <div class="sidebar-toggle" id="toggleSidebar">
                    <span>📄 文档列表</span>
                    <span class="toggle-icon">◀</span>
                </div>
                <div class="sidebar-content">
                    <button id="newDocBtn" class="btn-new-doc">
                        <span class="plus-icon">+</span> 新建文档
                    </button>
                    <div id="docList" class="doc-list">
                        <p class="loading">加载中...</p>
                    </div>
                </div>
            </aside>

            <!-- 编辑区 -->
            <div class="editor-wrapper">
                <div class="editor-container">
                    <!-- 标题输入 -->
                    <input type="text" id="docTitle" placeholder="输入文档标题..." class="ai-title-input">
                    <input type="hidden" id="currentDocId">

                    <!-- 内容编辑区 -->
                    <textarea id="docContent" placeholder="在这里写下你的想法..." class="ai-editor"></textarea>

                    <!-- 底部工具栏 -->
                    <div class="ai-toolbar">
                        <div class="toolbar-left">
                            <button id="deleteBtn" class="btn-toolbar" style="display:none;" title="删除文档">
                                🗑️ 删除
                            </button>
                        </div>
                        <div class="toolbar-center">
                            <span id="saveStatus" class="save-status"></span>
                        </div>
                        <div class="toolbar-right">
                            <button id="saveBtn" class="btn-save">
                                💾 保存
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 删除确认对话框 -->
    <div id="deleteModal" class="modal" style="display:none;">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h3>删除文档</h3>
            <p>确定要删除 "<span id="deleteDocTitle"></span>" 吗？</p>
            <p class="warning">此操作不可恢复</p>
            <div class="modal-actions">
                <button id="cancelDeleteBtn" class="btn-cancel">取消</button>
                <button id="confirmDeleteBtn" class="btn-confirm">删除</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        let currentDocId = null;
        let docs = [];
        let sidebarCollapsed = false;

        if (!token) {
            window.location.href = '/doc/login.html';
        }

        document.getElementById('welcomeMsg').textContent = username;

        // 检查是否为移动端
        const isMobile = () => window.innerWidth <= 768;

        // 侧边栏切换
        document.getElementById('toggleSidebar').addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            if (isMobile()) {
                // 移动端：使用 open 类控制显示/隐藏
                const sidebar = document.getElementById('docsSidebar');
                const overlay = document.getElementById('sidebarOverlay');
                sidebar.classList.toggle('open');
                overlay.classList.toggle('show');
                
                // 切换图标
                const icon = document.querySelector('.toggle-icon');
                if (icon) {
                    icon.textContent = sidebar.classList.contains('open') ? '✕' : '◀';
                }
            } else {
                // 桌面端：折叠/展开
                sidebarCollapsed = !sidebarCollapsed;
                document.getElementById('docsSidebar').classList.toggle('collapsed', sidebarCollapsed);
                const icon = document.querySelector('.toggle-icon');
                if (icon) {
                    icon.textContent = sidebarCollapsed ? '▶' : '◀';
                }
            }
        });

        // 点击遮罩层关闭侧边栏
        document.getElementById('sidebarOverlay').addEventListener('click', () => {
            document.getElementById('docsSidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
            const icon = document.querySelector('.toggle-icon');
            if (icon) {
                icon.textContent = '◀';
            }
        });

        async function loadDocList() {
            const docListEl = document.getElementById('docList');
            docListEl.innerHTML = '<div class="loading-spinner"></div>';
            
            try {
                const response = await fetch('/doc/api/docs', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success && data.docs) {
                    docs = data.docs;
                    renderDocList();
                } else {
                    docListEl.innerHTML = '<p class="empty">暂无文档</p>';
                }
            } catch (err) {
                docListEl.innerHTML = '<p class="error">加载失败</p>';
            }
        }

        function renderDocList() {
            const docListEl = document.getElementById('docList');
            
            if (docs.length === 0) {
                docListEl.innerHTML = '<p class="empty">暂无文档</p>';
                return;
            }

            docListEl.innerHTML = docs.map(doc => `
                <div class="doc-item ${doc.id === currentDocId ? 'active' : ''}" data-id="${doc.id}">
                    <div class="doc-item-title">${escapeHtml(doc.title)}</div>
                    <div class="doc-item-time">${formatTime(doc.updatedAt)}</div>
                </div>
            `).join('');

            docListEl.querySelectorAll('.doc-item').forEach(item => {
                item.addEventListener('click', () => loadDoc(item.dataset.id));
            });
        }

        async function loadDoc(docId) {
            if (!docId) return;
            
            try {
                const response = await fetch(`/doc/api/docs/${docId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    currentDocId = docId;
                    document.getElementById('currentDocId').value = docId;
                    document.getElementById('docTitle').value = data.doc.title;
                    document.getElementById('docContent').value = data.doc.content;
                    document.getElementById('deleteBtn').style.display = 'flex';
                    
                    document.querySelectorAll('.doc-item').forEach(item => {
                        item.classList.toggle('active', item.dataset.id === docId);
                    });
                    
                    document.getElementById('saveStatus').textContent = '';
                }
            } catch (err) {
                console.error('加载文档失败:', err);
            }
        }

        async function saveDoc() {
            const title = document.getElementById('docTitle').value || '未命名文档';
            const content = document.getElementById('docContent').value;
            const statusEl = document.getElementById('saveStatus');
            const docId = document.getElementById('currentDocId').value;
            
            if (!content.trim()) {
                statusEl.textContent = '⚠️ 内容不能为空';
                statusEl.className = 'save-status error';
                return;
            }

            statusEl.textContent = '保存中...';
            statusEl.className = 'save-status saving';
            
            try {
                const url = docId ? `/doc/api/docs/${docId}` : '/doc/api/docs';
                const method = docId ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ title, content })
                });
                const data = await response.json();
                
                if (data.success) {
                    if (!docId && data.docId) {
                        currentDocId = data.docId;
                        document.getElementById('currentDocId').value = data.docId;
                        document.getElementById('deleteBtn').style.display = 'flex';
                        await loadDocList();
                    }
                    
                    statusEl.textContent = '✓ 已保存';
                    statusEl.className = 'save-status saved';
                    setTimeout(() => {
                        statusEl.textContent = '';
                        statusEl.className = 'save-status';
                    }, 2000);
                }
            } catch (err) {
                statusEl.textContent = '保存失败';
                statusEl.className = 'save-status error';
            }
        }

        function showDeleteModal() {
            if (!currentDocId) return;
            const doc = docs.find(d => d.id === currentDocId);
            if (!doc) return;
            
            document.getElementById('deleteDocTitle').textContent = doc.title;
            document.getElementById('deleteModal').style.display = 'flex';
        }

        async function confirmDelete() {
            if (!currentDocId) return;
            
            try {
                const response = await fetch(`/doc/api/docs/${currentDocId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('deleteModal').style.display = 'none';
                    document.getElementById('docTitle').value = '';
                    document.getElementById('docContent').value = '';
                    document.getElementById('currentDocId').value = '';
                    document.getElementById('deleteBtn').style.display = 'none';
                    currentDocId = null;
                    await loadDocList();
                }
            } catch (err) {
                console.error('删除失败:', err);
            }
        }

        function newDoc() {
            currentDocId = null;
            document.getElementById('currentDocId').value = '';
            document.getElementById('docTitle').value = '';
            document.getElementById('docContent').value = '';
            document.getElementById('deleteBtn').style.display = 'none';
            document.getElementById('saveStatus').textContent = '';
            document.querySelectorAll('.doc-item').forEach(item => item.classList.remove('active'));
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/doc/login.html';
        });

        document.getElementById('saveBtn').addEventListener('click', saveDoc);
        document.getElementById('newDocBtn').addEventListener('click', newDoc);
        document.getElementById('deleteBtn').addEventListener('click', showDeleteModal);
        document.getElementById('cancelDeleteBtn').addEventListener('click', () => {
            document.getElementById('deleteModal').style.display = 'none';
        });
        document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveDoc();
            }
        });

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            
            return date.toLocaleDateString('zh-CN', { 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        loadDocList();
    </script>
</body>
</html>
