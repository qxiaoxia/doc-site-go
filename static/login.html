<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 文档编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-header {
            padding: 24px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        .logo {
            font-size: 22px;
            font-weight: 500;
            color: #1f1f1f;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 48px 40px;
        }

        .login-box h1 {
            font-size: 24px;
            font-weight: 400;
            color: #1f1f1f;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #5f6368;
            font-size: 14px;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1f1f1f;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            color: #1f1f1f;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 12px 24px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            background: #1557b0;
            box-shadow: 0 1px 3px rgba(26,115,232,0.3);
        }

        .error {
            color: #d93025;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }

        .footer {
            padding: 24px 40px;
            border-top: 1px solid #e0e0e0;
            text-align: center;
            color: #5f6368;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <header class="login-header">
        <div class="logo">📝 文档编辑器</div>
    </header>

    <div class="login-container">
        <div class="login-box">
            <h1>欢迎使用</h1>
            <p class="subtitle">登录以继续</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-primary">登录</button>
                <p id="errorMsg" class="error"></p>
            </form>
        </div>
    </div>

    <footer class="footer">
        安全登录 · 您的文档已加密保护
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMsg');
            
            errorEl.textContent = '';
            
            try {
                const response = await fetch('/doc/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    window.location.href = '/doc/editor.html';
                } else {
                    errorEl.textContent = data.message || '登录失败，请检查账号密码';
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请稍后重试';
                console.error('登录失败:', err);
            }
        });

        // 如果已登录，直接跳转
        if (localStorage.getItem('token')) {
            window.location.href = '/doc/editor.html';
        }
    </script>
</body>
</html>
